<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>NOX-SPARROW PAIRING</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet"
/>

<style>

/*========================================
RESET
========================================*/

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
overflow-x:hidden;
scroll-behavior:smooth;
}

body{

min-height:100vh;

padding:20px 10px;

background:#040816;

font-family:'Poppins',sans-serif;

display:flex;

justify-content:center;

align-items:flex-start;

overflow-y:auto;

position:relative;
}

/*========================================
PERFORMANCE FIX
========================================*/

.bg,
.matrix,
.card,
.circle{
transform:translateZ(0);
will-change:transform;
}

/*========================================
MATRIX EFFECT
========================================*/

.matrix{
position:fixed;
inset:0;
overflow:hidden;
z-index:1;
pointer-events:none;
}

.matrix span{

position:absolute;

top:-50px;

color:#00ffee;

font-size:12px;

opacity:0.18;

font-family:'Orbitron',sans-serif;

animation:rain linear infinite;
}

@keyframes rain{

0%{
transform:translateY(-100px);
opacity:0;
}

20%{
opacity:0.25;
}

100%{
transform:translateY(120vh);
opacity:0;
}
}

/*========================================
GRID
========================================*/

body::before{

content:'';

position:fixed;

inset:0;

background-image:
linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);

background-size:40px 40px;

animation:gridMove 18s linear infinite;

z-index:0;
}

@keyframes gridMove{

0%{
transform:translateY(0px);
}

100%{
transform:translateY(40px);
}
}

/*========================================
BACKGROUND CIRCLES
========================================*/

.bg{
position:fixed;
inset:0;
overflow:hidden;
z-index:0;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:0.22;
animation:float 12s infinite ease-in-out;
}

.circle:nth-child(1){
width:300px;
height:300px;
background:#00ffee;
top:-100px;
left:-100px;
}

.circle:nth-child(2){
width:280px;
height:280px;
background:#ff00ff;
bottom:-120px;
right:-100px;
}

.circle:nth-child(3){
width:250px;
height:250px;
background:#0066ff;
top:50%;
left:50%;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-25px);
}

100%{
transform:translateY(0px);
}
}

/*========================================
CONTAINER
========================================*/

.container{

width:100%;
max-width:520px;

position:relative;

z-index:5;

animation:fadeIn 1s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(25px);
}

to{
opacity:1;
transform:translateY(0px);
}
}

/*========================================
CARD
========================================*/

.card{

width:100%;

position:relative;

padding:28px 18px;

border-radius:28px;

background:rgba(5,10,25,0.18);

backdrop-filter:blur(8px);

overflow:hidden;

z-index:5;

border:1px solid rgba(255,255,255,0.05);

box-shadow:
0 0 25px rgba(0,255,255,0.08),
0 0 40px rgba(255,0,255,0.06);
}

/*========================================
ANIMATED BORDER
========================================*/

.card::before{

content:'';

position:absolute;

inset:-2px;

border-radius:30px;

padding:2px;

background:linear-gradient(
90deg,
#00ffee,
#0066ff,
#ff00ff,
#00ffee
);

background-size:300% 300%;

animation:borderMove 6s linear infinite;

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;

mask-composite:exclude;

pointer-events:none;
}

@keyframes borderMove{

0%{
background-position:0% 50%;
}

100%{
background-position:300% 50%;
}
}

/*========================================
STATUS
========================================*/

.status-bar{
display:flex;
align-items:center;
gap:10px;
color:#00ffee;
font-size:13px;
margin-bottom:22px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff66;

box-shadow:
0 0 10px #00ff66;
}

/*========================================
MUSIC BUTTON
========================================*/

.music-btn{

position:absolute;

top:16px;
right:16px;

width:50px;
height:50px;

border:none;

border-radius:50%;

background:rgba(255,255,255,0.08);

color:white;

font-size:18px;

cursor:pointer;

backdrop-filter:blur(10px);

transition:0.3s;
}

.music-btn:hover{
transform:scale(1.08);
}

/*========================================
LOGO
========================================*/

.logo{

width:100px;
height:100px;

margin:auto;

border-radius:50%;

overflow:hidden;

border:3px solid rgba(0,255,255,0.25);

box-shadow:
0 0 20px #00ffee,
0 0 45px rgba(0,255,255,0.25);
}

.logo img{
width:100%;
height:100%;
object-fit:cover;
}

/*========================================
TITLE
========================================*/

.title{

margin-top:20px;

text-align:center;

color:white;

font-family:'Orbitron',sans-serif;

font-size:40px;

line-height:1.2;

word-break:break-word;

text-shadow:
0 0 10px #00ffee;
}

.subtitle{

margin-top:14px;

text-align:center;

color:#d8d8d8;

font-size:14px;

line-height:1.7;
}

/*========================================
TECH BOX
========================================*/

.tech-box{

margin-top:25px;

background:rgba(0,0,0,0.18);

border:1px solid rgba(255,255,255,0.05);

border-radius:20px;

padding:18px;
}

.tech-line{

display:flex;

justify-content:space-between;

margin:12px 0;

color:#d7d7d7;

font-size:13px;
}

.tech-line strong{

color:#00ffee;

text-shadow:
0 0 8px #00ffee;
}

/*========================================
LINE
========================================*/

.neon-line{

width:100%;

height:2px;

margin-top:28px;

background:linear-gradient(
90deg,
transparent,
#00ffee,
transparent
);

box-shadow:
0 0 15px #00ffee;
}

/*========================================
INPUT
========================================*/

.inputBox{
margin-top:28px;
}

.inputBox input{

width:100%;

padding:16px;

border:none;
outline:none;

border-radius:16px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.08);

color:white;

font-size:15px;

transition:0.3s;
}

.inputBox input:focus{

border-color:#00ffee;

box-shadow:
0 0 18px rgba(0,255,255,0.30);
}

.inputBox input::placeholder{
color:#cfcfcf;
}

/*========================================
BUTTON
========================================*/

.button{

width:100%;

margin-top:22px;

padding:16px;

border:none;

border-radius:16px;

background:linear-gradient(
135deg,
#00ffee,
#0066ff
);

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

position:relative;

overflow:hidden;

transition:0.3s;
}

.button::before{

content:'';

position:absolute;

top:0;
left:-120%;

width:120%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.35),
transparent
);

transition:0.7s;
}

.button:hover::before{
left:120%;
}

.button:hover{
transform:translateY(-2px);
}

.button:disabled{
opacity:0.7;
cursor:not-allowed;
}

/*========================================
CODE BOX
========================================*/

.code-container{

margin-top:25px;

background:rgba(0,0,0,0.18);

border:1px solid rgba(0,255,255,0.10);

border-radius:22px;

padding:20px;

text-align:center;
}

.code-container h3{

color:white;

font-size:18px;

font-family:'Orbitron',sans-serif;

letter-spacing:2px;
}

.pair-code{

margin-top:20px;

color:#00ffee;

font-size:26px;

letter-spacing:2px;

word-break:break-word;

line-height:1.5;

text-shadow:
0 0 12px #00ffee;
}

/*========================================
FOOTER
========================================*/

.footer{

margin-top:24px;

text-align:center;

color:#999;

font-size:12px;

line-height:1.6;
}

/*========================================
MOBILE
========================================*/

@media(max-width:480px){

body{
padding:14px 8px;
}

.card{
padding:24px 15px;
}

.title{
font-size:32px;
}

.pair-code{
font-size:22px;
}
}

</style>

</head>

<body>

<div class="matrix"></div>

<div class="bg">

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

</div>

<div class="container">

<div class="card">

<button
class="music-btn"
onclick="toggleMusic()"
id="musicBtn"
>
🔊
</button>

<div class="status-bar">

<div class="dot"></div>

<span>
SERVER ONLINE
</span>

</div>

<div class="logo">

<img
src="bot.jpg"
alt="NOX-SPARROW"
/>

</div>

<h1 class="title">
NOX-SPARROW
</h1>

<p class="subtitle">

Futuristic WhatsApp Multi Device Pairing Interface Connected Securely To Render Cloud Infrastructure.

</p>

<div class="tech-box">

<div class="tech-line">
<span>SERVER</span>
<strong>CONNECTED</strong>
</div>

<div class="tech-line">
<span>API STATUS</span>
<strong>ACTIVE</strong>
</div>

<div class="tech-line">
<span>ENCRYPTION</span>
<strong>SHA-256</strong>
</div>

</div>

<div class="neon-line"></div>

<div class="inputBox">

<input
type="text"
id="number"
placeholder="256000000000"
/>

</div>

<button
class="button"
onclick="generateCode()"
id="generateBtn"
>
GENERATE PAIR CODE
</button>

<div class="code-container">

<h3>
GENERATED CODE
</h3>

<div
class="pair-code"
id="pairCode"
>
WAITING...
</div>

</div>

<div class="footer">
NOX-SPARROW • FUTURE TECHNOLOGY • RENDER CLOUD
</div>

</div>

</div>

<audio id="bgMusic" loop>

<source
src="song.mp3"
type="audio/mpeg"
/>

</audio>

<script>

/*========================================
MATRIX EFFECT
========================================*/

const matrix =
document.querySelector('.matrix')

for(let i = 0; i < 70; i++){

const span =
document.createElement('span')

span.innerHTML =
Math.random() > 0.5 ? '1' : '0'

span.style.left =
Math.random() * 100 + '%'

span.style.animationDuration =
6 + Math.random() * 8 + 's'

span.style.animationDelay =
Math.random() * 5 + 's'

matrix.appendChild(span)
}

/*========================================
MUSIC
========================================*/

const music =
document.getElementById('bgMusic')

const musicBtn =
document.getElementById('musicBtn')

let playing = false

function toggleMusic(){

if(!playing){

music.play()

musicBtn.innerHTML = '⏸️'

playing = true
}

else{

music.pause()

musicBtn.innerHTML = '🔊'

playing = false
}
}

/*========================================
PAIRING CODE
========================================*/

async function generateCode(){

const number =
document.getElementById('number').value.trim()

const pairCode =
document.getElementById('pairCode')

const button =
document.getElementById('generateBtn')

if(!number){

pairCode.innerHTML =
'ENTER PHONE NUMBER'

return
}

pairCode.innerHTML =
'GENERATING...'

button.innerHTML =
'CONNECTING...'

button.disabled = true

try{

const response =
await fetch(
`/pair?number=${number}`
)

const code =
await response.text()

console.log(code)

if(
response.ok &&
code &&
code !== 'FAILED'
){

pairCode.innerHTML =
code
}

else{

pairCode.innerHTML =
'FAILED'
}

}

catch(error){

console.log(error)

pairCode.innerHTML =
'SERVER ERROR'
}

button.innerHTML =
'GENERATE PAIR CODE'

button.disabled = false
}

</script>

</body>
</html>
